<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" fill="none">
  <!-- Circular flourish around the signature -->
  <ellipse cx="100" cy="35" rx="95" ry="32" stroke="#D4A843" stroke-width="0.8" fill="none" opacity="0.5" transform="rotate(-5, 100, 35)"/>

  <!-- "Dr." part -->
  <path d="M 30 20 C 30 20, 28 50, 35 50 C 42 50, 45 20, 45 20 M 35 35 C 40 35, 48 32, 48 38 C 48 44, 40 46, 35 45" stroke="#D4A843" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- dot -->
  <circle cx="55" cy="45" r="1.5" fill="#D4A843"/>

  <!-- "C" of Cindy -->
  <path d="M 75 22 C 62 22, 58 35, 62 44 C 66 53, 78 52, 82 46" stroke="#D4A843" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- "indy" -->
  <path d="M 78 30 L 78 48" stroke="#D4A843" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <!-- i dot -->
  <circle cx="78" cy="26" r="1.3" fill="#D4A843"/>

  <!-- n -->
  <path d="M 78 42 C 78 34, 88 30, 88 42 L 88 48" stroke="#D4A843" stroke-width="1.6" stroke-linecap="round" fill="none"/>

  <!-- d -->
  <path d="M 95 24 L 95 48 M 95 38 C 95 32, 88 30, 88 36 C 88 42, 95 44, 95 38" stroke="#D4A843" stroke-width="1.6" stroke-linecap="round" fill="none"/>

  <!-- y with descender -->
  <path d="M 102 30 L 106 48 M 110 30 L 104 56 C 102 60, 98 58, 100 55" stroke="#D4A843" stroke-width="1.6" stroke-linecap="round" fill="none"/>

  <!-- Decorative underline swoosh -->
  <path d="M 25 54 C 50 58, 90 60, 130 52 C 150 48, 160 50, 170 54" stroke="#D4A843" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
